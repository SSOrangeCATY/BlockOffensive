name: Build BlockOffensive

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Prepare FPSMatch composite dependency
        run: ./FPSMatch/gradlew createMinecraftArtifacts --no-daemon
      - name: Test, build, and report coverage
        run: ./gradlew test build jacocoTestReport --no-daemon
      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockoffensive-verification
          path: |
            build/libs/*.jar
            build/reports/jacoco/test
            build/test-results/test
