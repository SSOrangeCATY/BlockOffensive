modLoader = "javafml"
loaderVersion = "[1,)"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "logo.png"
authors = "${mod_authors}"

description = '''${mod_description}'''
[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "[${neo_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId="modernui"
type="required"
versionRange="[3.11.0,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="fpsmatch"
type="required"
versionRange="${fpsm_version_range}"
ordering="NONE"
side="BOTH"
